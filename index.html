<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madium • Download</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 420px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 12px 0;
            background: linear-gradient(to right, #e0e7ff, #c4d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a1a1aa;
            font-size: 16px;
            margin: 0 0 32px 0;
        }

        .download-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            width: 100%;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚡</div>
        <h1>Downloading Madium.exe</h1>
        <p>Your file is being prepared for download.</p>
        
        <a href="Madium.exe" download="Madium.exe" id="downloadLink">
            <button class="download-btn">
                Download Madium.exe
            </button>
        </a>

        <div class="status">
            <span class="spinner"></span>
            Starting download...
        </div>
    </div>

    <script>
        window.onload = function() {
            const link = document.getElementById('downloadLink');
            
            // Auto download after a short delay
            setTimeout(() => {
                link.click();
            }, 900);
        };
    </script>
</body>
</html>
